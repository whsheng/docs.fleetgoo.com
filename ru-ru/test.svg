<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect x="10" y="10" width="380" height="280" rx="15" ry="15" fill="#e0f2f1" />
  <!-- Header -->
  <rect x="10" y="10" width="380" height="50" rx="15" ry="15" fill="#26a69a" />
  <text x="200" y="40" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">✨ 分享卡片 ✨</text>
  <!-- Title -->
  <text x="200" y="90" font-family="sans-serif" font-size="20" font-weight="bold" fill="#37474f" text-anchor="middle">生命的终极意义</text>
  <!-- Keywords -->
  <text x="200" y="130" font-family="sans-serif" font-size="16" fill="#00796b" text-anchor="middle">
    <tspan fill="#4db6ac">#行动</tspan>
    <tspan dx="10" fill="#4db6ac">#责任</tspan>
    <tspan dx="10" fill="#4db6ac">#未来</tspan>
  </text>
  <!-- Summary -->
  <text x="200" y="190" font-family="sans-serif" font-size="14" fill="#546e7a" text-anchor="middle">
    <tspan x="200" dy="-10">生命的终极意义不在于知识，而在于行动。</tspan>
    <tspan x="200" dy="20">我们每个人都应肩负起改变世界的责任，</tspan>
    <tspan x="200" dy="20">为未来而活，而非追求个人安逸或成功。</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="270" font-family="sans-serif" font-size="12" fill="#78909c" text-anchor="middle">💡 行动胜于空谈，未来始于当下</text>
</svg>
