<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FleetGoo-Smart Operations.Safer Journeys. </title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

</head>
<body>

  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      onlyCover: true,    //只加载封面，因为当前没有Readme.md
      name: 'FleetGoo',  
      logo: '/assets/fleetgoo_logo.png',
      loadSidebar: true,
      loadNavbar: true,
      mergeNavbar: true,
       
      auto2top: true, // 跳转后自动到顶部
      coverpage: true,

      // subMaxLevel: 3, // TOC显示到H3级别

      // docsify-toc-plugin 配置
      toc: {
        tocMaxLevel: 3,
        target: 'h2,h3,h4,h5',
        scope: '.markdown-section', // 生成TOC内容的范围
        // 可以根据需要调整 other options
        // 例如：ignoreSelector: '.ignore-toc'
      },

      // 添加页脚配置
      footer: {
        copy: '<span>Copyright &copy; 2025 </span>',
        auth: '<a href="https://www.fleetgoo.com">FleetGoo</a> Powered by <a href="https://docsify.js.org">docsify </a>',
        pre: '<hr/>',
        style: 'text-align: center;',
      },





    }
  </script>

    <!-- 自定义样式 -->
  <style>
    .app-name-link img {
      max-width: 80px;  /* 设置导航栏logo最大宽度 */
      width: 100%;  /* 宽度自适应 */
      height: auto;  /* 高度自动调整 */
    }
    
    .cover-main img {
      max-width: 300px;  /* 设置封面页logo最大宽度 */
      width: 100%;  /* 宽度自适应 */
      height: auto;  /* 高度自动调整 */
    }
  </style>

  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>


<!-- 页面右侧 TOC -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-toc@1.1.0/dist/docsify-plugin-toc.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <!-- 添加页脚插件-->
  <script src="//cdn.jsdelivr.net/npm/docsify-footer-enh/dist/docsify-footer-enh.min.js"></script> 


</body>
</html>
